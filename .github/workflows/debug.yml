name: Debug Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: Run debug scraper
        run: python -m collector.debug_scrape
      - name: Upload debug output
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: debug_output/
          retention-days: 7
