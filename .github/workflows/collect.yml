name: BenchPro SERP Collector

on:
  # 3x daily schedule (UTC times — adjust for your timezone)
  # These are 8am, 12pm, 5pm US Pacific (UTC-7)
  schedule:
    - cron: '0 15 * * *'   # 8am Pacific
    - cron: '0 19 * * *'   # 12pm Pacific
    - cron: '0 0 * * *'    # 5pm Pacific

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright schedule
          playwright install chromium
          playwright install-deps chromium

      - name: Run SERP collector
        run: python run.py --no-push

      - name: Commit and push results
        run: |
          git config user.name "BenchPro Bot"
          git config user.email "benchpro-bot@users.noreply.github.com"
          git add docs/data/results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Update SERP data — $TIMESTAMP"
            git push
          fi
